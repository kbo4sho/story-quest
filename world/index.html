<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>World Quest — W0</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #87ceeb;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: env(safe-area-inset-left, 0);
      right: env(safe-area-inset-right, 0);
      padding: 12px 16px;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2c3e1f;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    #hud .title {
      font-weight: 700;
      font-size: 16px;
    }
    #hud .hint {
      margin-top: 2px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div class="title">World Quest · W0</div>
    <div class="hint">Tap the ground to walk.</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "simplex-noise": "https://unpkg.com/simplex-noise@4.0.3/dist/esm/simplex-noise.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { createNoise2D } from 'simplex-noise';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // Deterministic prairie — fixed seed so the world is the same every load.
    function makeSeededRandom(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }
    const rng = makeSeededRandom(42);
    const noise2D = createNoise2D(rng);

    // Gentle rolling hills — tuned for kid navigation, no steep slopes.
    function heightAt(x, z) {
      let h = 0;
      h += noise2D(x * 0.018, z * 0.018) * 1.8;
      h += noise2D(x * 0.05,  z * 0.05)  * 0.5;
      h += noise2D(x * 0.12,  z * 0.12)  * 0.15;
      return h;
    }

    const container = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9ad9ea);
    scene.fog = new THREE.Fog(0xdceaec, 55, 130);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // Lights
    const hemi = new THREE.HemisphereLight(0xffe9b3, 0x6b8c3a, 0.7);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xfff1cf, 1.0);
    sun.position.set(30, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 40;
    sun.shadow.camera.bottom = -40;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 120;
    sun.shadow.bias = -0.0005;
    scene.add(sun);

    // Sky dome — vertical gradient from warm horizon to cool zenith
    const skyGeo = new THREE.SphereGeometry(240, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      uniforms: {
        topColor:    { value: new THREE.Color(0x7fc4e8) },
        bottomColor: { value: new THREE.Color(0xfce9c1) },
      },
      vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec3 vWorldPos;
        void main() {
          float h = normalize(vWorldPos).y;
          float t = clamp((h + 0.15) * 1.6, 0.0, 1.0);
          gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
        }
      `,
      side: THREE.BackSide,
      depthWrite: false,
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // Rolling prairie — vertex-displaced heightmap
    const TERRAIN_SIZE = 180;
    const TERRAIN_SEGMENTS = 140;
    const TERRAIN_BOUND = TERRAIN_SIZE / 2 - 5;
    const groundGeo = new THREE.PlaneGeometry(
      TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS
    );
    groundGeo.rotateX(-Math.PI / 2); // lay flat, normal +Y

    const groundPos = groundGeo.attributes.position;
    const groundColors = new Float32Array(groundPos.count * 3);
    const lowC  = new THREE.Color(0x79a846);
    const midC  = new THREE.Color(0x9ecf57);
    const highC = new THREE.Color(0xcbe08a);
    const tmpC  = new THREE.Color();
    for (let i = 0; i < groundPos.count; i++) {
      const wx = groundPos.getX(i);
      const wz = groundPos.getZ(i);
      const h = heightAt(wx, wz);
      groundPos.setY(i, h);
      const t = THREE.MathUtils.clamp((h + 1.2) / 3.2, 0, 1);
      if (t < 0.5) tmpC.copy(lowC).lerp(midC, t * 2);
      else         tmpC.copy(midC).lerp(highC, (t - 0.5) * 2);
      const jitter = (rng() - 0.5) * 0.04;
      groundColors[i * 3    ] = THREE.MathUtils.clamp(tmpC.r + jitter, 0, 1);
      groundColors[i * 3 + 1] = THREE.MathUtils.clamp(tmpC.g + jitter, 0, 1);
      groundColors[i * 3 + 2] = THREE.MathUtils.clamp(tmpC.b + jitter, 0, 1);
    }
    groundGeo.setAttribute('color', new THREE.BufferAttribute(groundColors, 3));
    groundGeo.computeVertexNormals();
    const ground = new THREE.Mesh(
      groundGeo,
      new THREE.MeshLambertMaterial({ vertexColors: true })
    );
    ground.receiveShadow = true;
    scene.add(ground);

    // Ground-cover factories (grass, flowers) — primitive detail that sits
    // alongside the Quaternius kit (trees, rocks, bushes are loaded below).
    function makeGrassTuft() {
      const g = new THREE.Group();
      const mat = new THREE.MeshLambertMaterial({ color: 0x6fa83d });
      const count = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < count; i++) {
        const h = 0.28 + rng() * 0.18;
        const blade = new THREE.Mesh(
          new THREE.ConeGeometry(0.055, h, 4),
          mat
        );
        blade.position.set((rng() - 0.5) * 0.18, h / 2, (rng() - 0.5) * 0.18);
        blade.rotation.set((rng() - 0.5) * 0.35, rng() * Math.PI, (rng() - 0.5) * 0.35);
        g.add(blade);
      }
      return g;
    }

    function makeFlower() {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.35, 6),
        new THREE.MeshLambertMaterial({ color: 0x4c7a3a })
      );
      stem.position.y = 0.18;
      g.add(stem);
      const palette = [0xffe76b, 0xffffff, 0xfca6c1, 0xb084f0, 0xf8935c, 0xf06c64];
      const color = palette[Math.floor(rng() * palette.length)];
      const petal = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 8, 6),
        new THREE.MeshLambertMaterial({ color })
      );
      petal.position.y = 0.4;
      petal.scale.y = 0.7;
      petal.castShadow = true;
      g.add(petal);
      return g;
    }

    // Scatter with a simple minimum-distance check and an origin clearance zone.
    function scatter(count, factory, minDist, originClear) {
      const placed = [];
      let attempts = 0;
      const maxTries = count * 40;
      while (placed.length < count && attempts < maxTries) {
        attempts++;
        const x = (rng() - 0.5) * (TERRAIN_BOUND * 2 - 4);
        const z = (rng() - 0.5) * (TERRAIN_BOUND * 2 - 4);
        if (Math.hypot(x, z) < originClear) continue;
        let ok = true;
        for (const p of placed) {
          if (Math.hypot(p[0] - x, p[1] - z) < minDist) { ok = false; break; }
        }
        if (!ok) continue;
        placed.push([x, z]);
        const obj = factory();
        obj.position.set(x, heightAt(x, z), z);
        obj.rotation.y += rng() * Math.PI * 2;
        scene.add(obj);
      }
    }

    scatter(90, makeGrassTuft, 1.2, 1.5);
    scatter(55, makeFlower,    1.3, 1.5);

    // Quaternius kit — loaded async from world/assets (CC0 via poly.pizza).
    // Trees, rocks, and bushes come from GLBs; character swaps into the Finn
    // group once loaded (AnimationMixer drives idle/walk blend).
    const gltfLoader = new GLTFLoader();
    function loadGLB(url) {
      return new Promise((resolve, reject) =>
        gltfLoader.load(url, resolve, undefined, reject)
      );
    }
    function applyShadows(obj) {
      obj.traverse((n) => {
        if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
      });
    }
    function pickClip(clips, keywords) {
      for (const kw of keywords) {
        const c = clips.find((x) => x.name.toLowerCase().includes(kw));
        if (c) return c;
      }
      return null;
    }

    let mixer = null;
    let idleAction = null;
    let walkAction = null;
    let currentAction = null;
    let characterLoaded = false;

    (async () => {
      const [charGlb, pineGlb, twistedGlb, rockGlb, bushGlb] = await Promise.all([
        loadGLB('./assets/character.glb'),
        loadGLB('./assets/tree-pine.glb'),
        loadGLB('./assets/tree-twisted.glb'),
        loadGLB('./assets/rock.glb'),
        loadGLB('./assets/bush.glb'),
      ]);

      // Swap placeholder primitives for the rigged character
      const charModel = charGlb.scene;
      charModel.scale.setScalar(0.75); // kid-sized
      charModel.rotation.y = Math.PI; // GLB faces -Z; flip so it matches our facing convention
      applyShadows(charModel);
      while (finn.children.length) finn.remove(finn.children[0]);
      finn.add(charModel);

      mixer = new THREE.AnimationMixer(charModel);
      // Prefer the plain "Idle_Loop" / "Walk_Loop" clips over fancier variants
      const idleClip = pickClip(charGlb.animations, ['idle_loop', 'idle']);
      const walkClip = pickClip(charGlb.animations, ['walk_loop', 'walk', 'jog', 'run']);
      console.log('[kit] char clips:', charGlb.animations.map(c => c.name));
      console.log('[kit] picked idle:', idleClip && idleClip.name, 'walk:', walkClip && walkClip.name);
      if (idleClip) idleAction = mixer.clipAction(idleClip);
      if (walkClip) walkAction = mixer.clipAction(walkClip);
      if (idleAction) {
        idleAction.play();
        currentAction = idleAction;
      }
      characterLoaded = true;

      // Static prop factories — clone per instance.
      function propFactory(glb) {
        return () => {
          const node = glb.scene.clone(true);
          applyShadows(node);
          return node;
        };
      }
      const makePine    = propFactory(pineGlb);
      const makeTwisted = propFactory(twistedGlb);
      const makeRock    = propFactory(rockGlb);
      const makeBush    = propFactory(bushGlb);

      scatter(32, () => {
        const obj = rng() < 0.55 ? makePine() : makeTwisted();
        obj.scale.setScalar(0.9 + rng() * 0.7);
        return obj;
      }, 3.8, 4);

      scatter(40, () => {
        const obj = makeRock();
        obj.scale.setScalar(0.7 + rng() * 0.7);
        return obj;
      }, 2.6, 3);

      scatter(35, () => {
        const obj = makeBush();
        obj.scale.setScalar(0.8 + rng() * 0.5);
        return obj;
      }, 2.2, 2.5);
    })().catch((err) => console.error('Kit load failed:', err));

    // Finn — placeholder primitives
    const finn = new THREE.Group();
    const bodyH = 0.9;
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.28, 0.34, bodyH, 12),
      new THREE.MeshLambertMaterial({ color: 0x3a6fb0 })
    );
    body.position.y = bodyH / 2 + 0.25;
    body.castShadow = true;
    finn.add(body);

    // Legs (for a walk bob)
    const legMat = new THREE.MeshLambertMaterial({ color: 0x2c4a2a });
    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
    const legL = new THREE.Mesh(legGeo, legMat);
    const legR = new THREE.Mesh(legGeo, legMat);
    legL.position.set(-0.14, 0.25, 0);
    legR.position.set(0.14, 0.25, 0);
    legL.castShadow = true;
    legR.castShadow = true;
    finn.add(legL);
    finn.add(legR);

    // Head
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.26, 16, 12),
      new THREE.MeshLambertMaterial({ color: 0xf2cfa4 })
    );
    head.position.y = bodyH + 0.45;
    head.castShadow = true;
    finn.add(head);

    // Green hat
    const hat = new THREE.Mesh(
      new THREE.ConeGeometry(0.32, 0.45, 12),
      new THREE.MeshLambertMaterial({ color: 0x2e8a3a })
    );
    hat.position.y = bodyH + 0.82;
    hat.castShadow = true;
    finn.add(hat);

    // Simple "facing" nose so we can see which way Finn points
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      new THREE.MeshLambertMaterial({ color: 0xe8a97a })
    );
    nose.position.set(0, bodyH + 0.43, 0.24);
    finn.add(nose);

    finn.position.y = heightAt(0, 0);
    scene.add(finn);

    // Target marker — a ring that pulses at tap location
    const marker = new THREE.Group();
    const ringGeo = new THREE.RingGeometry(0.45, 0.6, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffe27a,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    marker.add(ring);
    marker.visible = false;
    marker.position.y = 0.02;
    scene.add(marker);

    // Movement state
    const target = new THREE.Vector3();
    let moving = false;
    const walkSpeed = 4.0; // units per second
    const turnSpeed = 10.0; // radians per second
    let facing = 0;
    let walkPhase = 0;

    // Camera rig — third-person follow
    const cameraOffset = new THREE.Vector3(0, 6, 9);
    const cameraTarget = new THREE.Vector3();
    const desiredCamPos = new THREE.Vector3();

    function placeCameraInstant() {
      desiredCamPos.copy(finn.position).add(cameraOffset);
      camera.position.copy(desiredCamPos);
      cameraTarget.copy(finn.position);
      cameraTarget.y += 0.8;
      camera.lookAt(cameraTarget);
    }
    placeCameraInstant();

    // Input — tap-to-move
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const tapDown = { x: 0, y: 0, t: 0, active: false };
    const TAP_MOVE_TOL = 10; // px
    const TAP_TIME_TOL = 500; // ms

    function setPointerFromEvent(ev, out) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width;
      const y = (ev.clientY - rect.top) / rect.height;
      out.x = x * 2 - 1;
      out.y = -(y * 2 - 1);
    }

    function handleTap(ev) {
      setPointerFromEvent(ev, pointer);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(ground, false)[0];
      if (!hit) return;
      target.copy(hit.point);
      target.x = THREE.MathUtils.clamp(target.x, -TERRAIN_BOUND, TERRAIN_BOUND);
      target.z = THREE.MathUtils.clamp(target.z, -TERRAIN_BOUND, TERRAIN_BOUND);
      target.y = heightAt(target.x, target.z);
      moving = true;
      marker.position.set(target.x, target.y + 0.04, target.z);
      marker.visible = true;
      marker.userData.spawnTime = performance.now();
    }

    renderer.domElement.addEventListener('pointerdown', (ev) => {
      tapDown.x = ev.clientX;
      tapDown.y = ev.clientY;
      tapDown.t = performance.now();
      tapDown.active = true;
    });

    renderer.domElement.addEventListener('pointerup', (ev) => {
      if (!tapDown.active) return;
      tapDown.active = false;
      const dx = ev.clientX - tapDown.x;
      const dy = ev.clientY - tapDown.y;
      const dt = performance.now() - tapDown.t;
      if (Math.hypot(dx, dy) <= TAP_MOVE_TOL && dt <= TAP_TIME_TOL) {
        handleTap(ev);
      }
    });

    renderer.domElement.addEventListener('pointercancel', () => {
      tapDown.active = false;
    });

    // Prevent iOS double-tap zoom and pinch on the canvas
    renderer.domElement.addEventListener('gesturestart', (e) => e.preventDefault());
    renderer.domElement.addEventListener('dblclick', (e) => e.preventDefault());

    // Resize
    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    resize();

    // Main loop
    const clock = new THREE.Clock();
    const tmpDir = new THREE.Vector3();

    function tick() {
      const dt = Math.min(clock.getDelta(), 0.05);

      if (moving) {
        tmpDir.set(target.x - finn.position.x, 0, target.z - finn.position.z);
        const dist = tmpDir.length();
        if (dist < 0.08) {
          moving = false;
        } else {
          tmpDir.normalize();
          const step = Math.min(walkSpeed * dt, dist);
          finn.position.x += tmpDir.x * step;
          finn.position.z += tmpDir.z * step;
          finn.position.y = heightAt(finn.position.x, finn.position.z);

          // Smooth facing
          const wanted = Math.atan2(tmpDir.x, tmpDir.z);
          let diff = wanted - facing;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turn = Math.sign(diff) * Math.min(Math.abs(diff), turnSpeed * dt);
          facing += turn;
          finn.rotation.y = facing;

          // Placeholder primitive walk bob — runs only before the rigged
          // character loads. After load, the AnimationMixer drives motion.
          if (!characterLoaded) {
            walkPhase += dt * 10;
            const swing = Math.sin(walkPhase) * 0.35;
            legL.rotation.x = swing;
            legR.rotation.x = -swing;
            body.position.y = bodyH / 2 + 0.25 + Math.abs(Math.sin(walkPhase)) * 0.04;
          }
        }
      } else if (!characterLoaded) {
        legL.rotation.x *= 0.85;
        legR.rotation.x *= 0.85;
        body.position.y = bodyH / 2 + 0.25;
      }

      // Character animation — fade between idle and walk on state change
      if (characterLoaded && mixer) {
        const desired = moving ? (walkAction || idleAction) : idleAction;
        if (desired && desired !== currentAction) {
          if (currentAction) currentAction.fadeOut(0.2);
          desired.reset().fadeIn(0.2).play();
          currentAction = desired;
        }
        mixer.update(dt);
      }

      // Camera smoothing
      desiredCamPos.copy(finn.position).add(cameraOffset);
      camera.position.lerp(desiredCamPos, 1 - Math.pow(0.001, dt));
      cameraTarget.lerp(
        new THREE.Vector3(finn.position.x, finn.position.y + 0.8, finn.position.z),
        1 - Math.pow(0.001, dt)
      );
      camera.lookAt(cameraTarget);

      // Marker pulse + fade
      if (marker.visible) {
        const age = (performance.now() - (marker.userData.spawnTime || 0)) / 1000;
        const pulse = 1 + Math.sin(age * 6) * 0.1;
        ring.scale.set(pulse, pulse, pulse);
        ringMat.opacity = moving ? 0.85 : Math.max(0, 0.85 - age * 0.8);
        if (!moving && age > 1.0) marker.visible = false;
      }

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
