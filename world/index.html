<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>World Quest — W0</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #87ceeb;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: env(safe-area-inset-left, 0);
      right: env(safe-area-inset-right, 0);
      padding: 12px 16px;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2c3e1f;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    #hud .title {
      font-weight: 700;
      font-size: 16px;
    }
    #hud .hint {
      margin-top: 2px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div class="title">World Quest · W1c</div>
    <div class="hint"><span id="biome-label"></span> — tap the ground to walk.</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "simplex-noise": "https://unpkg.com/simplex-noise@4.0.3/dist/esm/simplex-noise.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { createNoise2D } from 'simplex-noise';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // Biome configs — sky, fog, lights, terrain shape/color, props. Swap via
    // `?biome=highland` in the URL. Spatial blending comes later (W3).
    const BIOMES = {
      prairie: {
        sky:  { top: 0x7fc4e8, bottom: 0xfce9c1 },
        fog:  { color: 0xdceaec, near: 55, far: 130 },
        height: { octaves: [[0.018, 1.8], [0.05, 0.5], [0.12, 0.15]] },
        ground: { low: 0x79a846, mid: 0x9ecf57, high: 0xcbe08a, jitter: 0.04, span: [-1.2, 2.0] },
        hemi: { sky: 0xffe9b3, ground: 0x6b8c3a, intensity: 0.7 },
        sun:  { color: 0xfff1cf, intensity: 1.0 },
        grassTuft: { color: 0x6fa83d, count: 90, minDist: 1.2 },
        flowerProc: { count: 55, minDist: 1.3 },
        props: [
          { url: 'tree-oak.glb',     count: 18, minDist: 4.0, scale: [1.0, 1.6] },
          { url: 'tree-birch.glb',   count: 10, minDist: 4.5, scale: [1.0, 1.6] },
          { url: 'bush-leafy.glb',   count: 28, minDist: 2.2, scale: [0.8, 1.3] },
          { url: 'bush.glb',         count: 18, minDist: 2.4, scale: [0.9, 1.4] },
          { url: 'stump.glb',        count: 10, minDist: 3.0, scale: [0.7, 1.2] },
          { url: 'log.glb',          count: 6,  minDist: 3.5, scale: [0.8, 1.2] },
          { url: 'grass-tall.glb',   count: 40, minDist: 1.6, scale: [0.8, 1.3] },
          { url: 'flower-teal.glb',  count: 25, minDist: 1.4, scale: [0.8, 1.3] },
          { url: 'rock.glb',         count: 14, minDist: 3.0, scale: [0.6, 1.0] },
        ],
      },
      highland: {
        sky:  { top: 0x6b8fad, bottom: 0xc9d4da },
        fog:  { color: 0xc4cfd3, near: 45, far: 120 },
        height: { octaves: [[0.018, 3.4], [0.05, 1.2], [0.12, 0.35]] },
        ground: { low: 0x6a6a56, mid: 0x8d8d74, high: 0xc2c2b0, jitter: 0.05, span: [-2.0, 3.8] },
        hemi: { sky: 0xdbe1e6, ground: 0x5a5f4e, intensity: 0.55 },
        sun:  { color: 0xf2eddc, intensity: 0.85 },
        grassTuft: { color: 0x7f8a5a, count: 35, minDist: 1.8 },
        flowerProc: { count: 8, minDist: 3.0 },
        props: [
          { url: 'tree-pine.glb',       count: 14, minDist: 3.8, scale: [0.9, 1.3] },
          { url: 'tree-pine-tall.glb',  count: 10, minDist: 4.5, scale: [0.9, 1.4] },
          { url: 'tree-fir.glb',        count: 16, minDist: 4.0, scale: [0.9, 1.4] },
          { url: 'boulder.glb',         count: 10, minDist: 4.0, scale: [0.8, 1.4] },
          { url: 'rock-chunky.glb',     count: 18, minDist: 3.0, scale: [0.7, 1.3] },
          { url: 'rock-mossy.glb',      count: 14, minDist: 2.5, scale: [0.7, 1.2] },
          { url: 'rock.glb',            count: 22, minDist: 2.2, scale: [0.5, 1.0] },
          { url: 'mushroom.glb',        count: 12, minDist: 2.0, scale: [0.9, 1.4] },
        ],
      },
    };
    const biomeName = new URLSearchParams(location.search).get('biome') || 'prairie';
    const biome = BIOMES[biomeName] || BIOMES.prairie;
    const biomeLabel = document.getElementById('biome-label');
    if (biomeLabel) biomeLabel.textContent = biomeName.charAt(0).toUpperCase() + biomeName.slice(1);

    // Deterministic world — fixed seed so a given biome renders the same every load.
    function makeSeededRandom(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }
    const rng = makeSeededRandom(42);
    const noise2D = createNoise2D(rng);

    // Height function driven by the active biome's octave list.
    const heightOctaves = biome.height.octaves;
    function heightAt(x, z) {
      let h = 0;
      for (let i = 0; i < heightOctaves.length; i++) {
        const [freq, amp] = heightOctaves[i];
        h += noise2D(x * freq, z * freq) * amp;
      }
      return h;
    }

    const container = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(biome.sky.top);
    scene.fog = new THREE.Fog(biome.fog.color, biome.fog.near, biome.fog.far);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // Lights — biome-driven
    const hemi = new THREE.HemisphereLight(biome.hemi.sky, biome.hemi.ground, biome.hemi.intensity);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(biome.sun.color, biome.sun.intensity);
    sun.position.set(30, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -25;
    sun.shadow.camera.right = 25;
    sun.shadow.camera.top = 25;
    sun.shadow.camera.bottom = -25;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 120;
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    // Sun target must be in the scene graph for its transform to take effect.
    scene.add(sun.target);
    // Fixed sun direction relative to whatever Finn is standing under.
    const SUN_OFFSET = new THREE.Vector3(30, 50, 20);

    // Sky dome — vertical gradient from warm horizon to cool zenith
    const skyGeo = new THREE.SphereGeometry(240, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      uniforms: {
        topColor:    { value: new THREE.Color(biome.sky.top) },
        bottomColor: { value: new THREE.Color(biome.sky.bottom) },
      },
      vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec3 vWorldPos;
        void main() {
          float h = normalize(vWorldPos).y;
          float t = clamp((h + 0.15) * 1.6, 0.0, 1.0);
          gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
        }
      `,
      side: THREE.BackSide,
      depthWrite: false,
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // Rolling prairie — vertex-displaced heightmap
    const TERRAIN_SIZE = 180;
    const TERRAIN_SEGMENTS = 140;
    const TERRAIN_BOUND = TERRAIN_SIZE / 2 - 5;
    const groundGeo = new THREE.PlaneGeometry(
      TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS
    );
    groundGeo.rotateX(-Math.PI / 2); // lay flat, normal +Y

    const groundPos = groundGeo.attributes.position;
    const groundColors = new Float32Array(groundPos.count * 3);
    const lowC  = new THREE.Color(biome.ground.low);
    const midC  = new THREE.Color(biome.ground.mid);
    const highC = new THREE.Color(biome.ground.high);
    const tmpC  = new THREE.Color();
    const [spanLo, spanHi] = biome.ground.span;
    const spanRange = spanHi - spanLo;
    for (let i = 0; i < groundPos.count; i++) {
      const wx = groundPos.getX(i);
      const wz = groundPos.getZ(i);
      const h = heightAt(wx, wz);
      groundPos.setY(i, h);
      const t = THREE.MathUtils.clamp((h - spanLo) / spanRange, 0, 1);
      if (t < 0.5) tmpC.copy(lowC).lerp(midC, t * 2);
      else         tmpC.copy(midC).lerp(highC, (t - 0.5) * 2);
      const jitter = (rng() - 0.5) * biome.ground.jitter;
      groundColors[i * 3    ] = THREE.MathUtils.clamp(tmpC.r + jitter, 0, 1);
      groundColors[i * 3 + 1] = THREE.MathUtils.clamp(tmpC.g + jitter, 0, 1);
      groundColors[i * 3 + 2] = THREE.MathUtils.clamp(tmpC.b + jitter, 0, 1);
    }
    groundGeo.setAttribute('color', new THREE.BufferAttribute(groundColors, 3));
    groundGeo.computeVertexNormals();
    const ground = new THREE.Mesh(
      groundGeo,
      new THREE.MeshLambertMaterial({ vertexColors: true })
    );
    ground.receiveShadow = true;
    scene.add(ground);

    // Ground-cover factories (grass, flowers) — primitive detail that sits
    // alongside the Quaternius kit (trees, rocks, bushes are loaded below).
    function makeGrassTuft() {
      const g = new THREE.Group();
      const mat = new THREE.MeshLambertMaterial({ color: biome.grassTuft.color });
      const count = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < count; i++) {
        const h = 0.28 + rng() * 0.18;
        const blade = new THREE.Mesh(
          new THREE.ConeGeometry(0.055, h, 4),
          mat
        );
        blade.position.set((rng() - 0.5) * 0.18, h / 2, (rng() - 0.5) * 0.18);
        blade.rotation.set((rng() - 0.5) * 0.35, rng() * Math.PI, (rng() - 0.5) * 0.35);
        g.add(blade);
      }
      return g;
    }

    function makeFlower() {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.35, 6),
        new THREE.MeshLambertMaterial({ color: 0x4c7a3a })
      );
      stem.position.y = 0.18;
      g.add(stem);
      const palette = [0xffe76b, 0xffffff, 0xfca6c1, 0xb084f0, 0xf8935c, 0xf06c64];
      const color = palette[Math.floor(rng() * palette.length)];
      const petal = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 8, 6),
        new THREE.MeshLambertMaterial({ color })
      );
      petal.position.y = 0.4;
      petal.scale.y = 0.7;
      petal.castShadow = true;
      g.add(petal);
      return g;
    }

    // Scatter with a simple minimum-distance check and an origin clearance zone.
    function scatter(count, factory, minDist, originClear) {
      const placed = [];
      let attempts = 0;
      const maxTries = count * 40;
      while (placed.length < count && attempts < maxTries) {
        attempts++;
        const x = (rng() - 0.5) * (TERRAIN_BOUND * 2 - 4);
        const z = (rng() - 0.5) * (TERRAIN_BOUND * 2 - 4);
        if (Math.hypot(x, z) < originClear) continue;
        let ok = true;
        for (const p of placed) {
          if (Math.hypot(p[0] - x, p[1] - z) < minDist) { ok = false; break; }
        }
        if (!ok) continue;
        placed.push([x, z]);
        const obj = factory();
        obj.position.set(x, heightAt(x, z), z);
        obj.rotation.y += rng() * Math.PI * 2;
        scene.add(obj);
      }
    }

    scatter(biome.grassTuft.count,  makeGrassTuft, biome.grassTuft.minDist, 1.5);
    scatter(biome.flowerProc.count, makeFlower,    biome.flowerProc.minDist, 1.5);

    // Quaternius kit — loaded async from world/assets (CC0 via poly.pizza).
    // Trees, rocks, and bushes come from GLBs; character swaps into the Finn
    // group once loaded (AnimationMixer drives idle/walk blend).
    const gltfLoader = new GLTFLoader();
    function loadGLB(url) {
      return new Promise((resolve, reject) =>
        gltfLoader.load(url, resolve, undefined, reject)
      );
    }
    function applyShadows(obj) {
      obj.traverse((n) => {
        if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
      });
    }
    function pickClip(clips, keywords) {
      // Prefer exact match on the tail after any "Prefix|" (so "Rig|Idle_Loop"
      // with keyword "idle_loop" wins over "Crouch_Idle_Loop").
      for (const kw of keywords) {
        const exact = clips.find((x) => x.name.split('|').pop().toLowerCase() === kw);
        if (exact) return exact;
      }
      for (const kw of keywords) {
        const c = clips.find((x) => x.name.toLowerCase().includes(kw));
        if (c) return c;
      }
      return null;
    }

    let mixer = null;
    let idleAction = null;
    let walkAction = null;
    let currentAction = null;
    let characterLoaded = false;

    // Companions follow Finn at fixed local-space offsets; each has its own
    // mixer + idle/walk actions fadeset the same way as Finn's.
    const companions = [];
    let companionsReady = false;
    const UP = new THREE.Vector3(0, 1, 0);

    // KayKit characters hold equipment as named child meshes. Hide them so the
    // chibi adventurers read as generic kids for a K-2 audience.
    const WEAPON_KEYWORDS = [
      'sword','dagger','knife','axe','staff','stick','wand','bow','arrow',
      'mace','spear','shield','torch','hammer','bottle','book','rod',
    ];
    function hideEquipment(root) {
      root.traverse((n) => {
        if (!n.name) return;
        const lower = n.name.toLowerCase();
        if (WEAPON_KEYWORDS.some((kw) => lower.includes(kw))) n.visible = false;
      });
    }

    // Prepare a KayKit chibi character: scale, face our convention, hide
    // weapons, set up shadows + mixer with Idle/Walking_A actions.
    function setupKayKitChar(glb, groupTarget, initialActionRef, scale = 1.0) {
      const model = glb.scene;
      model.scale.setScalar(scale);
      hideEquipment(model);
      applyShadows(model);
      while (groupTarget.children.length) groupTarget.remove(groupTarget.children[0]);
      groupTarget.add(model);

      const m = new THREE.AnimationMixer(model);
      const idleClip = pickClip(glb.animations, ['unarmed_idle', 'idle']);
      const walkClip = pickClip(glb.animations, ['walking_a', 'walking', 'walk']);
      const idle = idleClip ? m.clipAction(idleClip) : null;
      const walk = walkClip ? m.clipAction(walkClip) : null;
      if (walk) walk.timeScale = 1.4;
      if (idle) idle.play();
      return { mixer: m, idle, walk };
    }

    (async () => {
      // Load Finn, Wren, and Pip GLBs in parallel
      const [finnGlb, wrenGlb, frogGlb] = await Promise.all([
        loadGLB('./assets/finn.glb'),
        loadGLB('./assets/wren.glb'),
        loadGLB('./assets/frog.glb'),
      ]);

      // Finn — KayKit Rogue_Hooded
      const finnSetup = setupKayKitChar(finnGlb, finn, null, 1.0);
      mixer = finnSetup.mixer;
      idleAction = finnSetup.idle;
      walkAction = finnSetup.walk;
      if (idleAction) currentAction = idleAction;
      characterLoaded = true;

      // Wren — KayKit Mage (own GLB, own skeleton, own mixer)
      const wren = new THREE.Group();
      scene.add(wren);
      const wrenSetup = setupKayKitChar(wrenGlb, wren, null, 1.0);

      // Pip — frog sidekick. Separate GLB with its own Idle/Jump animations.
      const pipScene = frogGlb.scene;
      pipScene.scale.setScalar(0.5);
      applyShadows(pipScene);
      const pip = new THREE.Group();
      pip.add(pipScene);
      scene.add(pip);
      const pipMixer = new THREE.AnimationMixer(pipScene);
      const pipIdleClip = pickClip(frogGlb.animations, ['idle']);
      const pipWalkClip = pickClip(frogGlb.animations, ['walk', 'jump', 'hop']);
      const pipIdle = pipIdleClip ? pipMixer.clipAction(pipIdleClip) : null;
      const pipWalk = pipWalkClip ? pipMixer.clipAction(pipWalkClip) : null;
      if (pipWalk) pipWalk.timeScale = 1.4;
      if (pipIdle) pipIdle.play();

      companions.push(
        {
          group: wren, mixer: wrenSetup.mixer,
          idle: wrenSetup.idle, walk: wrenSetup.walk, current: wrenSetup.idle,
          offset: new THREE.Vector3(-1.7, 0, -1.4),
        },
        {
          group: pip, mixer: pipMixer,
          idle: pipIdle, walk: pipWalk, current: pipIdle,
          offset: new THREE.Vector3(1.2, 0, -0.9),
        },
      );
      // Snap companions to their start offsets so they don't slide in from origin
      const startOffset = new THREE.Vector3();
      for (const c of companions) {
        startOffset.copy(c.offset).applyAxisAngle(UP, finn.rotation.y);
        c.group.position.set(
          finn.position.x + startOffset.x,
          heightAt(finn.position.x + startOffset.x, finn.position.z + startOffset.z),
          finn.position.z + startOffset.z,
        );
        c.group.rotation.y = finn.rotation.y;
      }
      companionsReady = true;

      // Biome props — load all in parallel, then scatter per spec
      const propGlbs = await Promise.all(
        biome.props.map((p) => loadGLB(`./assets/${p.url}`))
      );
      for (let i = 0; i < biome.props.length; i++) {
        const spec = biome.props[i];
        const glb = propGlbs[i];
        scatter(spec.count, () => {
          const obj = glb.scene.clone(true);
          applyShadows(obj);
          const [minS, maxS] = spec.scale;
          obj.scale.setScalar(minS + rng() * (maxS - minS));
          return obj;
        }, spec.minDist, 3);
      }
    })().catch((err) => console.error('Kit load failed:', err));

    // Finn — placeholder primitives
    const finn = new THREE.Group();
    const bodyH = 0.9;
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.28, 0.34, bodyH, 12),
      new THREE.MeshLambertMaterial({ color: 0x3a6fb0 })
    );
    body.position.y = bodyH / 2 + 0.25;
    body.castShadow = true;
    finn.add(body);

    // Legs (for a walk bob)
    const legMat = new THREE.MeshLambertMaterial({ color: 0x2c4a2a });
    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
    const legL = new THREE.Mesh(legGeo, legMat);
    const legR = new THREE.Mesh(legGeo, legMat);
    legL.position.set(-0.14, 0.25, 0);
    legR.position.set(0.14, 0.25, 0);
    legL.castShadow = true;
    legR.castShadow = true;
    finn.add(legL);
    finn.add(legR);

    // Head
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.26, 16, 12),
      new THREE.MeshLambertMaterial({ color: 0xf2cfa4 })
    );
    head.position.y = bodyH + 0.45;
    head.castShadow = true;
    finn.add(head);

    // Green hat
    const hat = new THREE.Mesh(
      new THREE.ConeGeometry(0.32, 0.45, 12),
      new THREE.MeshLambertMaterial({ color: 0x2e8a3a })
    );
    hat.position.y = bodyH + 0.82;
    hat.castShadow = true;
    finn.add(hat);

    // Simple "facing" nose so we can see which way Finn points
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      new THREE.MeshLambertMaterial({ color: 0xe8a97a })
    );
    nose.position.set(0, bodyH + 0.43, 0.24);
    finn.add(nose);

    finn.position.y = heightAt(0, 0);
    scene.add(finn);

    // Target marker — a ring that pulses at tap location
    const marker = new THREE.Group();
    const ringGeo = new THREE.RingGeometry(0.45, 0.6, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffe27a,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    marker.add(ring);
    marker.visible = false;
    marker.position.y = 0.02;
    scene.add(marker);

    // Movement state
    const target = new THREE.Vector3();
    let moving = false;
    const walkSpeed = 4.0; // units per second
    const turnSpeed = 10.0; // radians per second
    let facing = 0;
    let walkPhase = 0;

    // Camera rig — third-person follow
    const cameraOffset = new THREE.Vector3(0, 6, 9);
    const cameraTarget = new THREE.Vector3();
    const desiredCamPos = new THREE.Vector3();

    function placeCameraInstant() {
      desiredCamPos.copy(finn.position).add(cameraOffset);
      camera.position.copy(desiredCamPos);
      cameraTarget.copy(finn.position);
      cameraTarget.y += 0.8;
      camera.lookAt(cameraTarget);
    }
    placeCameraInstant();

    // Input — tap-to-move
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const tapDown = { x: 0, y: 0, t: 0, active: false };
    const TAP_MOVE_TOL = 10; // px
    const TAP_TIME_TOL = 500; // ms

    function setPointerFromEvent(ev, out) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width;
      const y = (ev.clientY - rect.top) / rect.height;
      out.x = x * 2 - 1;
      out.y = -(y * 2 - 1);
    }

    function handleTap(ev) {
      setPointerFromEvent(ev, pointer);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(ground, false)[0];
      if (!hit) return;
      target.copy(hit.point);
      target.x = THREE.MathUtils.clamp(target.x, -TERRAIN_BOUND, TERRAIN_BOUND);
      target.z = THREE.MathUtils.clamp(target.z, -TERRAIN_BOUND, TERRAIN_BOUND);
      target.y = heightAt(target.x, target.z);
      moving = true;
      marker.position.set(target.x, target.y + 0.04, target.z);
      marker.visible = true;
      marker.userData.spawnTime = performance.now();
    }

    renderer.domElement.addEventListener('pointerdown', (ev) => {
      tapDown.x = ev.clientX;
      tapDown.y = ev.clientY;
      tapDown.t = performance.now();
      tapDown.active = true;
    });

    renderer.domElement.addEventListener('pointerup', (ev) => {
      if (!tapDown.active) return;
      tapDown.active = false;
      const dx = ev.clientX - tapDown.x;
      const dy = ev.clientY - tapDown.y;
      const dt = performance.now() - tapDown.t;
      if (Math.hypot(dx, dy) <= TAP_MOVE_TOL && dt <= TAP_TIME_TOL) {
        handleTap(ev);
      }
    });

    renderer.domElement.addEventListener('pointercancel', () => {
      tapDown.active = false;
    });

    // Prevent iOS double-tap zoom and pinch on the canvas
    renderer.domElement.addEventListener('gesturestart', (e) => e.preventDefault());
    renderer.domElement.addEventListener('dblclick', (e) => e.preventDefault());

    // Resize
    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    resize();

    // Main loop
    const clock = new THREE.Clock();
    const tmpDir = new THREE.Vector3();

    function tick() {
      const dt = Math.min(clock.getDelta(), 0.05);

      if (moving) {
        tmpDir.set(target.x - finn.position.x, 0, target.z - finn.position.z);
        const dist = tmpDir.length();
        if (dist < 0.08) {
          moving = false;
        } else {
          tmpDir.normalize();
          const step = Math.min(walkSpeed * dt, dist);
          finn.position.x += tmpDir.x * step;
          finn.position.z += tmpDir.z * step;
          finn.position.y = heightAt(finn.position.x, finn.position.z);

          // Smooth facing
          const wanted = Math.atan2(tmpDir.x, tmpDir.z);
          let diff = wanted - facing;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turn = Math.sign(diff) * Math.min(Math.abs(diff), turnSpeed * dt);
          facing += turn;
          finn.rotation.y = facing;

          // Placeholder primitive walk bob — runs only before the rigged
          // character loads. After load, the AnimationMixer drives motion.
          if (!characterLoaded) {
            walkPhase += dt * 10;
            const swing = Math.sin(walkPhase) * 0.35;
            legL.rotation.x = swing;
            legR.rotation.x = -swing;
            body.position.y = bodyH / 2 + 0.25 + Math.abs(Math.sin(walkPhase)) * 0.04;
          }
        }
      } else if (!characterLoaded) {
        legL.rotation.x *= 0.85;
        legR.rotation.x *= 0.85;
        body.position.y = bodyH / 2 + 0.25;
      }

      // Character animation — fade between idle and walk on state change
      if (characterLoaded && mixer) {
        const desired = moving ? (walkAction || idleAction) : idleAction;
        if (desired && desired !== currentAction) {
          if (currentAction) currentAction.fadeOut(0.2);
          desired.reset().fadeIn(0.2).play();
          currentAction = desired;
        }
        mixer.update(dt);
      }

      // Companions — lerp to offset-from-Finn, match facing, drive their mixers
      if (companionsReady) {
        const followK = 1 - Math.pow(0.001, dt);
        const tmpOff = new THREE.Vector3();
        for (const c of companions) {
          tmpOff.copy(c.offset).applyAxisAngle(UP, finn.rotation.y);
          const dx = finn.position.x + tmpOff.x;
          const dz = finn.position.z + tmpOff.z;
          c.group.position.x += (dx - c.group.position.x) * followK;
          c.group.position.z += (dz - c.group.position.z) * followK;
          c.group.position.y = heightAt(c.group.position.x, c.group.position.z);
          c.group.rotation.y = finn.rotation.y;

          const desired = (moving && c.walk) ? c.walk : c.idle;
          if (desired && desired !== c.current) {
            if (c.current) c.current.fadeOut(0.2);
            desired.reset().fadeIn(0.2).play();
            c.current = desired;
          }
          c.mixer.update(dt);
        }
      }

      // Sun / shadow camera tracks Finn so shadows stay crisp anywhere in the world
      sun.target.position.copy(finn.position);
      sun.position.copy(finn.position).add(SUN_OFFSET);

      // Camera smoothing
      desiredCamPos.copy(finn.position).add(cameraOffset);
      camera.position.lerp(desiredCamPos, 1 - Math.pow(0.001, dt));
      cameraTarget.lerp(
        new THREE.Vector3(finn.position.x, finn.position.y + 0.8, finn.position.z),
        1 - Math.pow(0.001, dt)
      );
      camera.lookAt(cameraTarget);

      // Marker pulse + fade
      if (marker.visible) {
        const age = (performance.now() - (marker.userData.spawnTime || 0)) / 1000;
        const pulse = 1 + Math.sin(age * 6) * 0.1;
        ring.scale.set(pulse, pulse, pulse);
        ringMat.opacity = moving ? 0.85 : Math.max(0, 0.85 - age * 0.8);
        if (!moving && age > 1.0) marker.visible = false;
      }

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
