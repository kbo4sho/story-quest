    // chibi adventurers read as generic kids for a K-2 audience.
    const WEAPON_KEYWORDS = [
      'sword','dagger','knife','axe','staff','stick','wand','bow','arrow',
      'mace','spear','shield','torch','hammer','bottle','book','rod',
    ];
    function hideEquipment(root) {
      root.traverse((n) => {
        if (!n.name) return;
        const lower = n.name.toLowerCase();
        if (WEAPON_KEYWORDS.some((kw) => lower.includes(kw))) n.visible = false;
      });
    }

    // Prepare a KayKit chibi character: scale, face our convention, hide
    // weapons, set up shadows + mixer with Idle/Walking_A actions.
    function setupKayKitChar(glb, groupTarget, initialActionRef, scale = 1.0) {
      const model = glb.scene;
      model.scale.setScalar(scale);
      hideEquipment(model);
      applyShadows(model);
      while (groupTarget.children.length) groupTarget.remove(groupTarget.children[0]);
      groupTarget.add(model);

      const m = new THREE.AnimationMixer(model);
      const idleClip  = pickClip(glb.animations, ['unarmed_idle', 'idle']);
      const walkClip  = pickClip(glb.animations, ['walking_a', 'walking', 'walk']);
      const cheerClip = pickClip(glb.animations, ['cheer']);
      const idle  = idleClip  ? m.clipAction(idleClip)  : null;
      const walk  = walkClip  ? m.clipAction(walkClip)  : null;
      const cheer = cheerClip ? m.clipAction(cheerClip) : null;
      if (walk) walk.timeScale = 1.4;
      if (cheer) { cheer.loop = THREE.LoopOnce; cheer.clampWhenFinished = true; }
      if (idle) idle.play();
      return { mixer: m, idle, walk, cheer };
    }

    (async () => {
      // Load characters + the log GLB used for puzzle planks in parallel
      const [finnGlb, wrenGlb, frogGlb, knightGlb, logGlb] = await Promise.all([
        loadGLB('./assets/finn.glb'),
        loadGLB('./assets/wren.glb'),
        loadGLB('./assets/frog.glb'),
        loadGLB('./assets/knight.glb'),
        loadGLB('./assets/log.glb'),
      ]);

      // Finn — KayKit Rogue_Hooded
      const finnSetup = setupKayKitChar(finnGlb, finn, null, 1.0);
      mixer = finnSetup.mixer;
      idleAction = finnSetup.idle;
      walkAction = finnSetup.walk;
      if (idleAction) currentAction = idleAction;
      characterLoaded = true;

      // Wren — KayKit Mage (own GLB, own skeleton, own mixer)
      const wren = new THREE.Group();
      scene.add(wren);
      const wrenSetup = setupKayKitChar(wrenGlb, wren, null, 1.0);

      // Pip — frog sidekick. Separate GLB with its own Idle/Jump animations.
      const pipScene = frogGlb.scene;
      pipScene.scale.setScalar(0.5);
      applyShadows(pipScene);
      const pip = new THREE.Group();
      pip.add(pipScene);
      scene.add(pip);
      const pipMixer = new THREE.AnimationMixer(pipScene);
      const pipIdleClip = pickClip(frogGlb.animations, ['idle']);
      const pipWalkClip = pickClip(frogGlb.animations, ['walk', 'jump', 'hop']);
      const pipJumpClip = pickClip(frogGlb.animations, ['jump']);
      const pipIdle = pipIdleClip ? pipMixer.clipAction(pipIdleClip) : null;
      const pipWalk = pipWalkClip ? pipMixer.clipAction(pipWalkClip) : null;
      const pipJump = pipJumpClip ? pipMixer.clipAction(pipJumpClip) : null;
      if (pipWalk) pipWalk.timeScale = 1.4;
      if (pipJump) { pipJump.loop = THREE.LoopOnce; pipJump.clampWhenFinished = true; }
      if (pipIdle) pipIdle.play();

      companions.push(
        {
          id: 'wren',
          group: wren, mixer: wrenSetup.mixer,
          idle: wrenSetup.idle, walk: wrenSetup.walk, cheer: wrenSetup.cheer,
          current: wrenSetup.idle,
          offset: new THREE.Vector3(-1.7, 0, -1.4),
        },
        {
          id: 'pip',
          group: pip, mixer: pipMixer,
          idle: pipIdle, walk: pipWalk, cheer: pipJump,
          current: pipIdle,
          offset: new THREE.Vector3(1.2, 0, -0.9),
        },
      );

      // Attach the CROSSING template's content builder now that we have all
      // the loader-local state it needs (GLBs, mixers, finn/pip/wren refs).
      // This closure is called once per registered region below.
      TEMPLATE_CROSSING.build = function (region, saved) {
        const cx = region.center.x;
        const cz = region.center.z;
        const bridgeAlreadyBuilt = !!(saved && saved.flags && saved.flags.bridgeRebuilt);

        // NPC — Bridge Keeper (Knight). Stands on the north bank.
        const bridgeKeeper = new THREE.Group();
        const bkPos = { x: cx - 2, z: cz + 4.5 };
        bridgeKeeper.position.set(bkPos.x, heightAt(bkPos.x, bkPos.z), bkPos.z);
        bridgeKeeper.rotation.y = Math.atan2(-bkPos.x, -bkPos.z);
        scene.add(bridgeKeeper);
        const bkSetup = setupKayKitChar(knightGlb, bridgeKeeper, null, 1.0);
        npcs.push({
          id: `${region.id}:bridgeKeeper`,
          group: bridgeKeeper,
          mixer: bkSetup.mixer,
          triggerDist: 3.5,
          promptDist: 6.0,
          script: BRIDGE_KEEPER_SCRIPT,
          met: false,
        });

        // Bridge — two low stone piers at the ravine rim.
        const BRIDGE_SPAN = 5;
        const PIER_HEIGHT = 0.7;
        const pierAZ = cz - BRIDGE_SPAN / 2 - 0.4;
        const pierBZ = cz + BRIDGE_SPAN / 2 + 0.4;
        const pierAGround = heightAt(cx, pierAZ);
        const pierBGround = heightAt(cx, pierBZ);
        const stoneMat = new THREE.MeshLambertMaterial({ color: 0x8e867a });
        const pierGeo  = new THREE.BoxGeometry(1.8, PIER_HEIGHT, 1.2);
        const pierA = new THREE.Mesh(pierGeo, stoneMat);
        pierA.position.set(cx, pierAGround + PIER_HEIGHT / 2, pierAZ);
        pierA.castShadow = true; pierA.receiveShadow = true;
        scene.add(pierA);
        const pierB = new THREE.Mesh(pierGeo, stoneMat);
        pierB.position.set(cx, pierBGround + PIER_HEIGHT / 2, pierBZ);
        pierB.castShadow = true; pierB.receiveShadow = true;
        scene.add(pierB);
        const PLANK_FINAL_Y = Math.max(pierAGround, pierBGround) + PIER_HEIGHT + 0.08;

        // Six scattered planks on the Bridge Keeper's side, with final
        // positions along the bridge gap for the climax tween.
        const plankGeo = new THREE.BoxGeometry(1.6, 0.16, 0.5);
        const plankMat = new THREE.MeshLambertMaterial({ color: 0x9c6a3a });
        const scatteredPlanks = [];
        const plankFinalPositions = [];
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI + (rng() - 0.5) * 0.25;
          const dist  = 2.6 + rng() * 2.8;
          const px = bkPos.x + Math.cos(angle) * dist;
          const pz = bkPos.z + Math.sin(angle) * dist;
          const plank = new THREE.Mesh(plankGeo, plankMat);
          plank.castShadow = true; plank.receiveShadow = true;
          plank.position.set(px, heightAt(px, pz) + 0.08, pz);
          plank.rotation.y = rng() * Math.PI * 2;
          plank.rotation.z = (rng() - 0.5) * 0.15;
          scene.add(plank);
          scatteredPlanks.push(plank);

          const t = (i + 0.5) / 6;
          const finalZ = cz - BRIDGE_SPAN / 2 + t * BRIDGE_SPAN;
          plankFinalPositions.push(new THREE.Vector3(cx, PLANK_FINAL_Y, finalZ));
        }

        // Resuming a saved world where the bridge was already rebuilt — snap
        // the planks to their final positions and skip the climax trigger.
        if (bridgeAlreadyBuilt) {
          for (let i = 0; i < scatteredPlanks.length; i++) {
            const p = scatteredPlanks[i];
            p.position.copy(plankFinalPositions[i]);
            p.rotation.y = 0;
            p.rotation.z = 0;
          }
        }

        // W2c climax — four beats. Closure captures scatteredPlanks, pip, wren.
        triggerClimax = function () {
          setTimeout(() => {
            const pipC = companions.find((c) => c.id === 'pip');
            if (pipC) playCompanionOneShot(pipC, pipC.cheer);
            showBubble(pip, 'Ribbit!', 1800, 1.1);
          }, 300);

          setTimeout(() => {
            audio.whoosh(1100);
            const now = performance.now();
            for (let i = 0; i < scatteredPlanks.length; i++) {
              const p = scatteredPlanks[i];
              plankTweens.push({
                plank: p,
                from:     p.position.clone(),
                fromRotY: p.rotation.y,
                fromRotZ: p.rotation.z,
                to:       plankFinalPositions[i],
                toRotY:   0,
                toRotZ:   0,
                startTime: now + i * 140,
                duration:  950,
              });
            }
          }, 1300);

          setTimeout(() => {
            const wrenC = companions.find((c) => c.id === 'wren');
            if (wrenC) playCompanionOneShot(wrenC, wrenC.cheer);
            showBubble(wren, 'You did it!', 2400, 2.0);
            flags.bridgeRebuilt = true;
            saveState();
          }, 3900);
        };
      };

      // Shared build for any dynamic "hill with an NPC on top" template. Used
      // by MOUND / CLIFF / BASIN. The NPC position depends on the template
      // geometry: top-of-hill for MOUND/CLIFF, north of the rim for BASIN.
      function buildDynamicNpcScene(region, saved) {
        const tpl = region.template;
        const cx = region.center.x;
        const cz = region.center.z;
        let nx = cx;
        let nz = cz;
        if (tpl.id === 'basin') {
          const r = region.params.radius || 9;
          nz = cz + r + 1.5; // just past the north rim
        }
        const npcName = (region.topic && region.topic.npcName) || 'Wanderer';
        const lines   = (region.topic && region.topic.lines) || ['Hello there!'];
        const script  = lines.map((text, i) => ({
          speaker: npcName,
          text,
          end: i === lines.length - 1,
        }));

        const npcGroup = new THREE.Group();
        npcGroup.position.set(nx, heightAt(nx, nz), nz);
        npcGroup.rotation.y = Math.atan2(-nx, -nz); // face toward spawn
        scene.add(npcGroup);
        const setup = setupKayKitChar(knightGlb, npcGroup, null, 1.0);
        npcs.push({
          id: `${region.id}:keeper`,
          group: npcGroup,
          mixer: setup.mixer,
          triggerDist: 3.5,
          promptDist: 6.0,
          script,
          met: !!(saved && saved.npcs && saved.npcs.find &&
                  saved.npcs.find((n) => n.id === `${region.id}:keeper`) &&
                  saved.npcs.find((n) => n.id === `${region.id}:keeper`).met),
        });

        // Rebuild any sub-NPCs previously added via deepening.
        if (Array.isArray(region.subNpcs)) {
          for (const sub of region.subNpcs) buildSubNpc(region, sub);
        }
      }
      TEMPLATE_MOUND.build = buildDynamicNpcScene;
      TEMPLATE_CLIFF.build = buildDynamicNpcScene;
      TEMPLATE_BASIN.build = buildDynamicNpcScene;

      // Sub-NPC builder — placed once here so the module-level deepenRegion
      // can call through to it via the `buildSubNpc` slot.
      buildSubNpc = function (region, sub) {
        const cx = region.center.x;
        const cz = region.center.z;
        const nx = cx + sub.offset.dx;
        const nz = cz + sub.offset.dz;
        const script = sub.lines.map((text, i) => ({
          speaker: sub.npcName,
          text,
          end: i === sub.lines.length - 1,
        }));
        const npcGroup = new THREE.Group();
        npcGroup.position.set(nx, heightAt(nx, nz), nz);
        npcGroup.rotation.y = Math.atan2(cx - nx, cz - nz);
        scene.add(npcGroup);
        const setup = setupKayKitChar(knightGlb, npcGroup, null, 1.0);
        const npc = {
          id: sub.id,
          group: npcGroup,
          mixer: setup.mixer,
          triggerDist: 3.0,
          promptDist: 5.0,
          script,
          met: !!sub.met,
        };
        npcs.push(npc);
        // Keep the saved record in sync when met flips.
        Object.defineProperty(sub, '_npcRef', { value: npc, enumerable: false });
      };

      // Build each registered region's content.
      for (const r of regions) {
        if (r.template && r.template.build) r.template.build(r, savedState);
      }

      // Campfire — the always-available "ask a question" hub. Wren stands near
      // it; tapping starts the campfire dialogue (for W4a this is a hardcoded
      // topic picker; W4b will wire the chosen topic to a region spawn).
      const campfire = new THREE.Group();
      const cfPos = { x: 2, z: 2 };
      const logMat = new THREE.MeshLambertMaterial({ color: 0x5a3a1f });
      const logGeo = new THREE.CylinderGeometry(0.09, 0.11, 0.95, 6);
      for (let i = 0; i < 5; i++) {
        const log = new THREE.Mesh(logGeo, logMat);
        const angle = (i / 5) * Math.PI * 2;
        log.position.set(Math.cos(angle) * 0.18, 0.3, Math.sin(angle) * 0.18);
        log.rotation.z = Math.PI / 7;
        log.rotation.y = angle;
        log.castShadow = true;
        campfire.add(log);
      }
      // Base stones around the logs
      const stoneSmallMat = new THREE.MeshLambertMaterial({ color: 0x7b766a });
      for (let i = 0; i < 7; i++) {
        const stone = new THREE.Mesh(new THREE.IcosahedronGeometry(0.16, 0), stoneSmallMat);
        const a = (i / 7) * Math.PI * 2 + 0.15;
        stone.position.set(Math.cos(a) * 0.55, 0.08, Math.sin(a) * 0.55);
        stone.rotation.y = rng() * Math.PI;
        stone.castShadow = true;
        stone.receiveShadow = true;
        campfire.add(stone);
      }
      const flame = new THREE.Mesh(
        new THREE.ConeGeometry(0.26, 0.6, 7),
        new THREE.MeshBasicMaterial({ color: 0xffc46b, transparent: true, opacity: 0.95 })
      );
      flame.position.y = 0.62;
      campfire.add(flame);
      const flameLight = new THREE.PointLight(0xffa55a, 0.9, 7, 2);
      flameLight.position.y = 0.8;
      campfire.add(flameLight);

      campfire.position.set(cfPos.x, heightAt(cfPos.x, cfPos.z), cfPos.z);
      scene.add(campfire);
      campfireFlame = flame;
      campfireLight = flameLight;

      npcs.push({
        id: 'campfire',
        group: campfire,
        mixer: null,
        triggerDist: 2.4,
        promptDist: 4.5,
        script: CAMPFIRE_SCRIPT,
        met: false,
        reusable: true, // Leo can walk up and ask again as many times as he wants
        armed: true,    // re-arms only after he leaves the prompt zone
      });

      // Apply saved world state now that NPCs exist: Finn position + facing,
      // flags bag, per-NPC met. Skipped cleanly on first launch.
      if (savedState) {
        const sx = THREE.MathUtils.clamp(savedState.finn.x, -TERRAIN_BOUND, TERRAIN_BOUND);
        const sz = THREE.MathUtils.clamp(savedState.finn.z, -TERRAIN_BOUND, TERRAIN_BOUND);
        finn.position.set(sx, heightAt(sx, sz), sz);
        facing = savedState.finn.facing || 0;
        finn.rotation.y = facing;
        Object.assign(flags, savedState.flags || {});
        for (const s of savedState.npcs || []) {
          const npc = npcs.find((n) => n.id === s.id);
          if (npc) npc.met = !!s.met;
        }
        placeCameraInstant(); // snap camera so it doesn't sweep in
      }

      // Snap companions to their start offsets so they don't slide in from origin
      const startOffset = new THREE.Vector3();
      for (const c of companions) {
        startOffset.copy(c.offset).applyAxisAngle(UP, finn.rotation.y);
        c.group.position.set(
          finn.position.x + startOffset.x,
          heightAt(finn.position.x + startOffset.x, finn.position.z + startOffset.z),
          finn.position.z + startOffset.z,
        );
        c.group.rotation.y = finn.rotation.y;
      }
      companionsReady = true;

      // Biome props — load all in parallel, then scatter per spec
      const propGlbs = await Promise.all(
        biome.props.map((p) => loadGLB(`./assets/${p.url}`))
      );
      for (let i = 0; i < biome.props.length; i++) {
        const spec = biome.props[i];
        const glb = propGlbs[i];
        // Attach sway to foliage materials (trees, bushes, grass, flowers).
        // Skip rocks, boulders, mushrooms, stumps, logs — they shouldn't sway.
        const url = spec.url.toLowerCase();
        if (/tree|bush|grass|flower/.test(url)) {
          const opts = url.includes('tree')
            ? { strength: 0.06, freq: 1.0, maxHeight: 3.0 }
            : url.includes('bush')
              ? { strength: 0.05, freq: 1.4, maxHeight: 0.9 }
              : { strength: 0.07, freq: 1.8, maxHeight: 0.6 };
          applySwayToScene(glb.scene, opts);
        }
        scatter(spec.count, () => {
          const obj = glb.scene.clone(true);
          applyShadows(obj);
          const [minS, maxS] = spec.scale;
          obj.scale.setScalar(minS + rng() * (maxS - minS));
          return obj;
        }, spec.minDist, 3);
      }
    })().catch((err) => console.error('Kit load failed:', err));

    // Finn — placeholder primitives
    const finn = new THREE.Group();
    const bodyH = 0.9;
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.28, 0.34, bodyH, 12),
      new THREE.MeshLambertMaterial({ color: 0x3a6fb0 })
    );
    body.position.y = bodyH / 2 + 0.25;
    body.castShadow = true;
    finn.add(body);

    // Legs (for a walk bob)
    const legMat = new THREE.MeshLambertMaterial({ color: 0x2c4a2a });
    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
    const legL = new THREE.Mesh(legGeo, legMat);
    const legR = new THREE.Mesh(legGeo, legMat);
    legL.position.set(-0.14, 0.25, 0);
    legR.position.set(0.14, 0.25, 0);
    legL.castShadow = true;
    legR.castShadow = true;
    finn.add(legL);
    finn.add(legR);

    // Head
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.26, 16, 12),
      new THREE.MeshLambertMaterial({ color: 0xf2cfa4 })
    );
    head.position.y = bodyH + 0.45;
    head.castShadow = true;
    finn.add(head);

    // Green hat
    const hat = new THREE.Mesh(
      new THREE.ConeGeometry(0.32, 0.45, 12),
      new THREE.MeshLambertMaterial({ color: 0x2e8a3a })
    );
    hat.position.y = bodyH + 0.82;
    hat.castShadow = true;
    finn.add(hat);

    // Simple "facing" nose so we can see which way Finn points
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      new THREE.MeshLambertMaterial({ color: 0xe8a97a })
    );
    nose.position.set(0, bodyH + 0.43, 0.24);
    finn.add(nose);

    finn.position.y = heightAt(0, 0);
    scene.add(finn);

    // Target marker — a ring that pulses at tap location
    const marker = new THREE.Group();
    const ringGeo = new THREE.RingGeometry(0.45, 0.6, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffe27a,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    marker.add(ring);
    marker.visible = false;
    marker.position.y = 0.02;
    scene.add(marker);

    // Movement state
    const target = new THREE.Vector3();
    let moving = false;
    const walkSpeed = 4.0; // units per second
    const turnSpeed = 10.0; // radians per second
    let facing = 0;
    let walkPhase = 0;
    let lastFootstep = 0; // perf time of last footstep SFX
    let lastSave = 0;     // perf time of last periodic save
    let campfireFlame = null;
    let campfireLight = null;

    // Camera rig — third-person follow
    const cameraOffset = new THREE.Vector3(0, 6, 9);
    const cameraTarget = new THREE.Vector3();
    const desiredCamPos = new THREE.Vector3();

    function placeCameraInstant() {
      desiredCamPos.copy(finn.position).add(cameraOffset);
      camera.position.copy(desiredCamPos);
      cameraTarget.copy(finn.position);
      cameraTarget.y += 0.8;
      camera.lookAt(cameraTarget);
    }
    placeCameraInstant();

    // Input — tap-to-move
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const tapDown = { x: 0, y: 0, t: 0, active: false };
    const TAP_MOVE_TOL = 10; // px
    const TAP_TIME_TOL = 500; // ms

    function setPointerFromEvent(ev, out) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width;
      const y = (ev.clientY - rect.top) / rect.height;
      out.x = x * 2 - 1;
      out.y = -(y * 2 - 1);
    }

    function handleTap(ev) {
      setPointerFromEvent(ev, pointer);
      raycaster.setFromCamera(pointer, camera);
      const chunkMeshes = [];
      for (const c of chunks) { if (c.mesh) chunkMeshes.push(c.mesh); }
      const hit = raycaster.intersectObjects(chunkMeshes, false)[0];
      if (!hit) return;
      if (viewMode === 'world') {
        // Fast-travel — teleport Finn to the tapped chunk, snap companions,
        // then return to walking view.
        const y = heightAt(hit.point.x, hit.point.z);
        finn.position.set(hit.point.x, y, hit.point.z);
        facing = Math.atan2(-hit.point.x, -hit.point.z);
        finn.rotation.y = facing;
        for (const c of companions) {
          const off = c.offset.clone().applyAxisAngle(UP, finn.rotation.y);
          const cx = finn.position.x + off.x;
          const cz = finn.position.z + off.z;
          c.group.position.set(cx, heightAt(cx, cz), cz);
          c.group.rotation.y = finn.rotation.y;
        }
        viewMode = 'walk';
        if (viewToggleBtn) viewToggleBtn.textContent = 'Map';
        marker.visible = false;
        moving = false;
        saveState();
        return;
      }
      target.copy(hit.point);
      // Region collision — snap target to the rim on Finn's current side.
      const snapped = snapOutOfBlocked(target.x, target.z, finn.position.z);
      target.x = snapped.x;
      target.z = snapped.z;
      target.y = heightAt(target.x, target.z);
      moving = true;
      marker.position.set(target.x, target.y + 0.04, target.z);
      marker.visible = true;
      marker.userData.spawnTime = performance.now();
    }

    renderer.domElement.addEventListener('pointerdown', (ev) => {
      // First gesture unlocks iOS audio context; also resumes if suspended.
      audio.init();
      audio.resume();
      tapDown.x = ev.clientX;
      tapDown.y = ev.clientY;
      tapDown.t = performance.now();
      tapDown.active = true;
    });

    renderer.domElement.addEventListener('pointerup', (ev) => {
      if (!tapDown.active) return;
      tapDown.active = false;
      const dx = ev.clientX - tapDown.x;
      const dy = ev.clientY - tapDown.y;
      const dt = performance.now() - tapDown.t;
      if (Math.hypot(dx, dy) <= TAP_MOVE_TOL && dt <= TAP_TIME_TOL) {
        if (dialogueActive) advanceDialogue();
        else                handleTap(ev);
      }
    });

    renderer.domElement.addEventListener('pointercancel', () => {
      tapDown.active = false;
    });

    // Prevent iOS double-tap zoom and pinch on the canvas
    renderer.domElement.addEventListener('gesturestart', (e) => e.preventDefault());
    renderer.domElement.addEventListener('dblclick', (e) => e.preventDefault());

    // Resize
    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    resize();

    // Main loop
    const clock = new THREE.Clock();
    const tmpDir = new THREE.Vector3();

    function tick() {
      const dt = Math.min(clock.getDelta(), 0.05);

      if (moving) {
        tmpDir.set(target.x - finn.position.x, 0, target.z - finn.position.z);
        const dist = tmpDir.length();
        if (dist < 0.08) {
          moving = false;
        } else {
          tmpDir.normalize();
          const step = Math.min(walkSpeed * dt, dist);
          const nextX = finn.position.x + tmpDir.x * step;
          const nextZ = finn.position.z + tmpDir.z * step;
          // Region collision — if the step would enter a blocked area, stop.
          if (isBlocked(nextX, nextZ)) {
            moving = false;
            marker.visible = false;
          } else {
            finn.position.x = nextX;
            finn.position.z = nextZ;
            finn.position.y = heightAt(finn.position.x, finn.position.z);
          }

          // Footstep SFX — roughly matches the 1.4x-speed walk cycle cadence
          const nowMs = performance.now();
          if (nowMs - lastFootstep > 380) {
            audio.footstep();
            lastFootstep = nowMs;
          }
          // Periodic save so position persists without spamming localStorage
          if (nowMs - lastSave > 2000) {
            saveState();
            lastSave = nowMs;
          }

          // Smooth facing
          const wanted = Math.atan2(tmpDir.x, tmpDir.z);
          let diff = wanted - facing;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turn = Math.sign(diff) * Math.min(Math.abs(diff), turnSpeed * dt);
          facing += turn;
          finn.rotation.y = facing;

          // Placeholder primitive walk bob — runs only before the rigged
          // character loads. After load, the AnimationMixer drives motion.
          if (!characterLoaded) {
            walkPhase += dt * 10;
            const swing = Math.sin(walkPhase) * 0.35;
            legL.rotation.x = swing;
            legR.rotation.x = -swing;
            body.position.y = bodyH / 2 + 0.25 + Math.abs(Math.sin(walkPhase)) * 0.04;
          }
        }
      } else if (!characterLoaded) {
        legL.rotation.x *= 0.85;
        legR.rotation.x *= 0.85;
        body.position.y = bodyH / 2 + 0.25;
      }

      // Character animation — fade between idle and walk on state change
      if (characterLoaded && mixer) {
        const desired = moving ? (walkAction || idleAction) : idleAction;
        if (desired && desired !== currentAction) {
          if (currentAction) currentAction.fadeOut(0.2);
          desired.reset().fadeIn(0.2).play();
          currentAction = desired;
        }
        mixer.update(dt);
      }

      // NPCs — drive their mixers and check proximity for dialogue
      let nearestPromptable = null;
      let nearestDist = Infinity;
      for (const n of npcs) {
        if (n.mixer) n.mixer.update(dt);
        const d = finn.position.distanceTo(n.group.position);
        // Reusable NPCs re-arm only after Finn leaves the prompt zone, so we
        // don't immediately re-trigger while he's still standing next to them.
        if (n.reusable && !n.armed && d > n.promptDist) n.armed = true;
        if (dialogueActive) continue;
        if (n.met && !n.reusable) continue;       // talk-once gate (except reusable)
        if (n.reusable && !n.armed) continue;     // waiting for player to walk away
        if (n.when && !n.when()) continue;        // optional extra gating
        if (d < n.promptDist && d < nearestDist) {
          nearestPromptable = n;
          nearestDist = d;
        }
        if (d < n.triggerDist && !moving) {
          startDialogue(n.script, n.group, n);
          break;
        }
      }
      if (!dialogueActive) {
        if (nearestPromptable) dlgUI.prompt.classList.add('visible');
        else                   dlgUI.prompt.classList.remove('visible');
      }

      // Companions — lerp to offset-from-Finn, match facing, drive their mixers
      if (companionsReady) {
        const followK = 1 - Math.pow(0.001, dt);
        const tmpOff = new THREE.Vector3();
        for (const c of companions) {
          tmpOff.copy(c.offset).applyAxisAngle(UP, finn.rotation.y);
          const dx = finn.position.x + tmpOff.x;
          const dz = finn.position.z + tmpOff.z;
          c.group.position.x += (dx - c.group.position.x) * followK;
          c.group.position.z += (dz - c.group.position.z) * followK;
          c.group.position.y = heightAt(c.group.position.x, c.group.position.z);
          c.group.rotation.y = finn.rotation.y;

          const desired = (moving && c.walk) ? c.walk : c.idle;
          if (desired && desired !== c.current) {
            if (c.current) c.current.fadeOut(0.2);
            desired.reset().fadeIn(0.2).play();
            c.current = desired;
          }
          c.mixer.update(dt);
        }
      }

      // Sun / shadow camera tracks Finn so shadows stay crisp anywhere in the world
      sun.target.position.copy(finn.position);
      sun.position.copy(finn.position).add(SUN_OFFSET);

      // Chunk drop-in tweens — whole chunks animate from below into place
      // when a new topic spawns one.
      if (chunkDropIns.length) {
        const nowT = performance.now();
        for (let i = chunkDropIns.length - 1; i >= 0; i--) {
          const d = chunkDropIns[i];
          const u = Math.min(1, (nowT - d.startTime) / d.duration);
          const e = 1 - Math.pow(1 - u, 3);
          d.chunk.mesh.position.y = d.from + (d.to - d.from) * e;
          if (u >= 1) {
            d.chunk.mesh.position.y = d.to;
            chunkDropIns.splice(i, 1);
            if (d.onComplete) d.onComplete();
          }
        }
      }

      // Terrain rise tweens — a new region's mesh vertices animate up/down
      // from their pre-spawn Y to their final terrainDelta over ~1.5s.
      if (risingTweens.length) {
        const nowT = performance.now();
        const pos = groundGeo.attributes.position;
        let anyActive = false;
        for (let i = risingTweens.length - 1; i >= 0; i--) {
          const tw = risingTweens[i];
          const elapsed = nowT - tw.startTime;
          const u = Math.min(1, elapsed / tw.duration);
          const e = 1 - Math.pow(1 - u, 3); // ease-out cubic
          for (const v of tw.verts) {
            const newY = v.startY + v.deltaY * e;
            pos.setY(v.i, newY);
            const tt = THREE.MathUtils.clamp((newY - spanLo) / spanRange, 0, 1);
            if (tt < 0.5) tmpC.copy(lowC).lerp(midC, tt * 2);
            else          tmpC.copy(midC).lerp(highC, (tt - 0.5) * 2);
            groundColors[v.i * 3    ] = tmpC.r;
            groundColors[v.i * 3 + 1] = tmpC.g;
            groundColors[v.i * 3 + 2] = tmpC.b;
          }
          anyActive = true;
          if (u >= 1) {
            risingTweens.splice(i, 1);
            if (tw.onComplete) tw.onComplete();
          }
        }
        if (anyActive) {
          pos.needsUpdate = true;
          groundGeo.attributes.color.needsUpdate = true;
          groundGeo.computeVertexNormals();
        }
      }

      // Plank tweens — arc each scattered plank into its bridge position.
      if (plankTweens.length) {
        const nowT = performance.now();
        for (let i = plankTweens.length - 1; i >= 0; i--) {
          const tw = plankTweens[i];
          const elapsed = nowT - tw.startTime;
          if (elapsed < 0) continue;
          const u = Math.min(1, elapsed / tw.duration);
          const e = 1 - Math.pow(1 - u, 3); // ease-out cubic
          tw.plank.position.lerpVectors(tw.from, tw.to, e);
          tw.plank.position.y += Math.sin(u * Math.PI) * 1.8; // arc up mid-flight
          tw.plank.rotation.y = tw.fromRotY + (tw.toRotY - tw.fromRotY) * e;
          tw.plank.rotation.z = tw.fromRotZ + (tw.toRotZ - tw.fromRotZ) * e;
          if (u >= 1) plankTweens.splice(i, 1);
        }
      }

      // Region labels — DOM overlays anchored to each region's center. Only
      // visible in world view. Labels are created lazily so spawned regions
      // pick up a label automatically on the next tick.
      const w = window.innerWidth;
      const h = window.innerHeight;
      const tmpRegionProj = new THREE.Vector3();
      for (const r of regions) {
        const label = (r.topic && (r.topic.name || r.topic.npcName)) || r.id;
        if (!r._labelDiv) {
          const div = document.createElement('div');
          div.className = 'region-label';
          div.textContent = label;
          document.body.appendChild(div);
          r._labelDiv = div;
        }
        if (viewMode !== 'world') {
          r._labelDiv.classList.remove('visible');
          continue;
        }
        tmpRegionProj.set(r.center.x, heightAt(r.center.x, r.center.z) + 1.5, r.center.z);
        tmpRegionProj.project(camera);
        const onScreen = tmpRegionProj.z > -1 && tmpRegionProj.z < 1;
        if (!onScreen) {
          r._labelDiv.classList.remove('visible');
          continue;
        }
        r._labelDiv.style.left = ((tmpRegionProj.x * 0.5 + 0.5) * w) + 'px';
        r._labelDiv.style.top  = ((-tmpRegionProj.y * 0.5 + 0.5) * h) + 'px';
        r._labelDiv.classList.add('visible');
      }

      // Speech bubbles — project each bubble's anchor point to screen coords
      if (activeBubbles.length) {
        const nowMs = performance.now();
        const w = window.innerWidth;
        const h = window.innerHeight;
        const tmpProj = new THREE.Vector3();
        for (let i = activeBubbles.length - 1; i >= 0; i--) {
          const b = activeBubbles[i];
          tmpProj.copy(b.target.position);
          tmpProj.y += b.yOffset;
          tmpProj.project(camera);
          const onScreen = tmpProj.z < 1 && tmpProj.z > -1;
          b.div.style.display = onScreen ? 'block' : 'none';
          if (onScreen) {
            b.div.style.left = ((tmpProj.x * 0.5 + 0.5) * w) + 'px';
            b.div.style.top  = ((-tmpProj.y * 0.5 + 0.5) * h) + 'px';
          }
          if (nowMs > b.expireAt) {
            b.div.classList.remove('visible');
            const div = b.div;
            setTimeout(() => div.remove(), 300);
            activeBubbles.splice(i, 1);
          }
        }
      }

      // Campfire flicker — cheap sine-stacked scale + light intensity pulse.
      if (campfireFlame) {
        const ft = performance.now() * 0.005;
        campfireFlame.scale.y = 0.92 + Math.sin(ft) * 0.08 + Math.sin(ft * 2.7) * 0.04;
        campfireFlame.scale.x = 0.95 + Math.cos(ft * 1.3) * 0.06;
        if (campfireLight) campfireLight.intensity = 0.75 + Math.sin(ft * 1.8) * 0.18;
      }

      // Wind sway — push current time into all swayable materials' uniforms.
      const swayT = performance.now() * 0.001;
      for (let i = 0; i < swayMaterials.length; i++) {
        const u = swayMaterials[i].userData.swayUniforms;
        if (u && u.uSwayTime) u.uSwayTime.value = swayT;
      }

      // Particles — bob each mote vertically and anchor the cloud to Finn so
      // atmosphere surrounds him as he walks. Slow rotation adds drift.
      const pArr = particleGeo.attributes.position.array;
      for (let i = 0; i < particleSpec.count; i++) {
        pArr[i * 3 + 1] = pBaseY[i]
          + Math.sin(swayT * 0.6 + pPhase[i]) * 0.25
          + Math.sin(swayT * 1.4 + pPhase[i] * 1.7) * 0.12;
      }
      particleGeo.attributes.position.needsUpdate = true;
      particles.position.x = finn.position.x;
      particles.position.z = finn.position.z;
      particles.rotation.y += dt * 0.04;

      // Camera smoothing — world view overrides everything; dialogue mode
      // frames Finn + the NPC side-on; walk mode uses the fixed follow offset.
      // Fog near/far tween between walk values and pulled-back world values
      // so distant regions don't bleach out but still hold some atmosphere.
      const camK = 1 - Math.pow(0.001, dt);
      const targetNear = (viewMode === 'world') ? 85 : biome.fog.near;
      const targetFar  = (viewMode === 'world') ? 240 : biome.fog.far;
      walkFog.near += (targetNear - walkFog.near) * camK;
      walkFog.far  += (targetFar  - walkFog.far)  * camK;
      if (viewMode === 'world') {
        desiredCamPos.copy(WORLD_CAM_POS);
        camera.position.lerp(desiredCamPos, camK);
        cameraTarget.lerp(WORLD_CAM_TARGET, camK);
      } else if (dialogueActive && dlgNpcGroup) {
        const midX = (finn.position.x + dlgNpcGroup.position.x) * 0.5;
        const midZ = (finn.position.z + dlgNpcGroup.position.z) * 0.5;
        const dx = dlgNpcGroup.position.x - finn.position.x;
        const dz = dlgNpcGroup.position.z - finn.position.z;
        const len = Math.hypot(dx, dz) || 1;
        const perpX =  dz / len;
        const perpZ = -dx / len;
        const dlgDist = 5.2;
        const dlgHeight = 3.2;
        const midY = heightAt(midX, midZ);
        desiredCamPos.set(midX + perpX * dlgDist, midY + dlgHeight, midZ + perpZ * dlgDist);
        camera.position.lerp(desiredCamPos, camK);
        cameraTarget.lerp(
          new THREE.Vector3(midX, midY + 1.2, midZ),
          camK
        );
      } else {
        desiredCamPos.copy(finn.position).add(cameraOffset);
        camera.position.lerp(desiredCamPos, camK);
        cameraTarget.lerp(
          new THREE.Vector3(finn.position.x, finn.position.y + 0.8, finn.position.z),
          camK
        );
      }
      camera.lookAt(cameraTarget);

      // Marker pulse + fade
      if (marker.visible) {
        const age = (performance.now() - (marker.userData.spawnTime || 0)) / 1000;
        const pulse = 1 + Math.sin(age * 6) * 0.1;
        ring.scale.set(pulse, pulse, pulse);
        ringMat.opacity = moving ? 0.85 : Math.max(0, 0.85 - age * 0.8);
        if (!moving && age > 1.0) marker.visible = false;
      }

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
